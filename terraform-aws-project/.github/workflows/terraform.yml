name: Terraform

on:
  pull_request:
    paths:
      - "terraform-aws-project/**"
  push:
    branches:
      - main
    paths:
      - "terraform-aws-project/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  fmt:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform-aws-project
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.6

      - name: Check Terraform formatting
        run: terraform fmt -check -recursive

  validate:
    runs-on: ubuntu-latest
    needs: fmt
    strategy:
      fail-fast: false
      matrix:
        environment:
          - dev
          - prod
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.6

      - name: Init Terraform without backend
        working-directory: terraform-aws-project/environments/${{ matrix.environment }}
        run: terraform init -backend=false

      - name: Validate Terraform
        working-directory: terraform-aws-project/environments/${{ matrix.environment }}
        run: terraform validate
