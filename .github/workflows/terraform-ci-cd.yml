name: Terraform CI/CD

on:
  pull_request:
    paths:
      - "terraform-aws-project/environments/**"
      - "terraform-aws-project/modules/**"
      - ".github/workflows/terraform-ci-cd.yml"
  push:
    branches:
      - main
    paths:
      - "terraform-aws-project/environments/**"
      - "terraform-aws-project/modules/**"
      - ".github/workflows/terraform-ci-cd.yml"
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment target"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - prod
      action:
        description: "Terraform action"
        required: true
        default: "plan"
        type: choice
        options:
          - plan
          - apply

permissions:
  contents: read
  id-token: write

env:
  TF_VERSION: "1.8.5"
  AWS_REGION: "eu-west-1"

jobs:
  fmt:
    name: Terraform fmt check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Check formatting
        run: terraform fmt -check -recursive terraform-aws-project

  validate:
    name: Validate (${{ matrix.tf_env }})
    runs-on: ubuntu-latest
    needs: fmt
    strategy:
      fail-fast: false
      matrix:
        tf_env: [dev, prod]

    defaults:
      run:
        working-directory: terraform-aws-project/environments/${{ matrix.tf_env }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform init (without backend)
        run: terraform init -input=false -backend=false

      - name: Terraform validate
        run: terraform validate

  plan_dev:
    name: Plan (dev)
    runs-on: ubuntu-latest
    needs: validate
    if: |
      (github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false) ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'dev')

    defaults:
      run:
        working-directory: terraform-aws-project/environments/dev

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Check required secrets (dev)
        env:
          AWS_ROLE_ARN_DEV: ${{ secrets.AWS_ROLE_ARN_DEV }}
          TF_STATE_BUCKET: ${{ secrets.TF_STATE_BUCKET }}
          TF_LOCK_TABLE: ${{ secrets.TF_LOCK_TABLE }}
        run: |
          missing=()
          [ -z "$AWS_ROLE_ARN_DEV" ] && missing+=("AWS_ROLE_ARN_DEV")
          [ -z "$TF_STATE_BUCKET" ] && missing+=("TF_STATE_BUCKET")
          [ -z "$TF_LOCK_TABLE" ] && missing+=("TF_LOCK_TABLE")

          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error title=Missing GitHub secrets::Missing required secrets: ${missing[*]}"
            exit 1
          fi

      - name: Configure AWS credentials (dev)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_DEV }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: terraform-plan-dev
          mask-aws-account-id: true

      - name: Terraform init
        run: |
          terraform init -input=false \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=dev/platform/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ secrets.TF_LOCK_TABLE }}"

      - name: Terraform plan
        run: terraform plan -input=false -no-color -var-file=terraform.tfvars -out=tfplan

      - name: Upload plan artifact (dev)
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-dev
          path: terraform-aws-project/environments/dev/tfplan
          if-no-files-found: error

  plan_prod:
    name: Plan (prod)
    runs-on: ubuntu-latest
    needs: validate
    if: |
      (github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false) ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'prod')

    defaults:
      run:
        working-directory: terraform-aws-project/environments/prod

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Check required secrets (prod)
        env:
          AWS_ROLE_ARN_PROD: ${{ secrets.AWS_ROLE_ARN_PROD }}
          TF_STATE_BUCKET: ${{ secrets.TF_STATE_BUCKET }}
          TF_LOCK_TABLE: ${{ secrets.TF_LOCK_TABLE }}
        run: |
          missing=()
          [ -z "$AWS_ROLE_ARN_PROD" ] && missing+=("AWS_ROLE_ARN_PROD")
          [ -z "$TF_STATE_BUCKET" ] && missing+=("TF_STATE_BUCKET")
          [ -z "$TF_LOCK_TABLE" ] && missing+=("TF_LOCK_TABLE")

          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error title=Missing GitHub secrets::Missing required secrets: ${missing[*]}"
            exit 1
          fi

      - name: Configure AWS credentials (prod)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_PROD }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: terraform-plan-prod
          mask-aws-account-id: true

      - name: Terraform init
        run: |
          terraform init -input=false \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=prod/platform/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ secrets.TF_LOCK_TABLE }}"

      - name: Terraform plan
        run: terraform plan -input=false -no-color -var-file=terraform.tfvars -out=tfplan

      - name: Upload plan artifact (prod)
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-prod
          path: terraform-aws-project/environments/prod/tfplan
          if-no-files-found: error

  apply_dev:
    name: Apply (dev)
    runs-on: ubuntu-latest
    needs: plan_dev
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'dev' && github.event.inputs.action == 'apply')
    environment: development
    concurrency:
      group: terraform-dev
      cancel-in-progress: false

    defaults:
      run:
        working-directory: terraform-aws-project/environments/dev

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Check required secrets (dev)
        env:
          AWS_ROLE_ARN_DEV: ${{ secrets.AWS_ROLE_ARN_DEV }}
          TF_STATE_BUCKET: ${{ secrets.TF_STATE_BUCKET }}
          TF_LOCK_TABLE: ${{ secrets.TF_LOCK_TABLE }}
        run: |
          missing=()
          [ -z "$AWS_ROLE_ARN_DEV" ] && missing+=("AWS_ROLE_ARN_DEV")
          [ -z "$TF_STATE_BUCKET" ] && missing+=("TF_STATE_BUCKET")
          [ -z "$TF_LOCK_TABLE" ] && missing+=("TF_LOCK_TABLE")

          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error title=Missing GitHub secrets::Missing required secrets: ${missing[*]}"
            exit 1
          fi

      - name: Configure AWS credentials (dev)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_DEV }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: terraform-apply-dev
          mask-aws-account-id: true

      - name: Terraform init
        run: |
          terraform init -input=false \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=dev/platform/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ secrets.TF_LOCK_TABLE }}"

      - name: Download plan artifact (dev)
        uses: actions/download-artifact@v4
        with:
          name: tfplan-dev
          path: terraform-aws-project/environments/dev

      - name: Terraform apply
        run: terraform apply -input=false -auto-approve tfplan

  apply_prod:
    name: Apply (prod)
    runs-on: ubuntu-latest
    needs: plan_prod
    if: |
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.environment == 'prod' &&
      github.event.inputs.action == 'apply'
    environment: production
    concurrency:
      group: terraform-prod
      cancel-in-progress: false

    defaults:
      run:
        working-directory: terraform-aws-project/environments/prod

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Check required secrets (prod)
        env:
          AWS_ROLE_ARN_PROD: ${{ secrets.AWS_ROLE_ARN_PROD }}
          TF_STATE_BUCKET: ${{ secrets.TF_STATE_BUCKET }}
          TF_LOCK_TABLE: ${{ secrets.TF_LOCK_TABLE }}
        run: |
          missing=()
          [ -z "$AWS_ROLE_ARN_PROD" ] && missing+=("AWS_ROLE_ARN_PROD")
          [ -z "$TF_STATE_BUCKET" ] && missing+=("TF_STATE_BUCKET")
          [ -z "$TF_LOCK_TABLE" ] && missing+=("TF_LOCK_TABLE")

          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error title=Missing GitHub secrets::Missing required secrets: ${missing[*]}"
            exit 1
          fi

      - name: Configure AWS credentials (prod)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_PROD }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: terraform-apply-prod
          mask-aws-account-id: true

      - name: Terraform init
        run: |
          terraform init -input=false \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=prod/platform/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ secrets.TF_LOCK_TABLE }}"

      - name: Download plan artifact (prod)
        uses: actions/download-artifact@v4
        with:
          name: tfplan-prod
          path: terraform-aws-project/environments/prod

      - name: Terraform apply
        run: terraform apply -input=false -auto-approve tfplan